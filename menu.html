<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MENU | NOIR CAFE</title>

<style>
:root{
  --bg:#f7f3ec;
  --text:#1f1f1d;
  --muted:#6f6a61;
  --line:#ddd4c7;
  --accent:#9b7a4e;
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
  font-family: Georgia,"Yu Mincho",serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.9;
}

a{text-decoration:none;color:inherit;}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 6vw;
  background:rgba(247,243,236,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,.05);
}

.logo{
  font-size:15px;
  letter-spacing:.16em;
}

.nav-links{
  display:flex;
  gap:24px;
  font-size:12px;
  letter-spacing:.14em;
}

/* HEADER */
.header{
  padding:140px 6vw 60px;
}

h1{
  font-size:clamp(50px,9vw,110px);
  font-weight:400;
  letter-spacing:-.04em;
}

/* CATEGORY */
.category{
  padding:80px 6vw;
  border-top:1px solid var(--line);
}

.category h2{
  font-size:clamp(32px,6vw,70px);
  font-weight:400;
  margin-bottom:40px;
}

/* MENU ITEM */
.menu-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.item{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:20px;
  align-items:start;
  border-bottom:1px solid var(--line);
  padding-bottom:24px;
}

.item img{
  width:100%;
  height:120px;
  object-fit:cover;
  background:#e5ded2;
}

.item h3{
  font-size:22px;
  margin-bottom:4px;
}

.price{
  color:var(--accent);
  font-size:14px;
}

.desc{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
}

/* MOBILE */
@media(max-width:800px){

  nav{
    display:block;
    padding:14px 18px;
  }

  .nav-links{
    gap:14px;
    overflow-x:auto;
    white-space:nowrap;
    font-size:11px;
  }

  .header{
    padding:110px 20px 40px;
  }

  .category{
    padding:60px 20px;
  }

  .menu-list{
    grid-template-columns:1fr;
  }

  .item{
    grid-template-columns:1fr;
  }

  .item img{
    height:220px;
  }

}
</style>
</head>

<body>

<nav>
  <div class="logo" id="navShopName">NOIR CAFE</div>
  <div class="nav-links">
    <a href="index.html">TOP</a>
    <a href="menu.html">MENU</a>
    <a href="index.html#access">ACCESS</a>
    <a href="index.html#reserve">RESERVE</a>
  </div>
</nav>

<div class="header">
  <h1>Menu</h1>
</div>

<div id="menuContainer"></div>

<script>

/* =========================
   店舗名
========================= */
fetch('./data/site.json')
  .then(res => res.json())
  .then(data => {
    const name = data.shopName || 'NOIR CAFE';
    document.title = 'MENU | ' + name;
    document.getElementById('navShopName').textContent = name;
  });


/* =========================
   メニュー生成
========================= */
fetch('./data/menu.json')
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById('menuContainer');
    container.innerHTML = '';

    if(!data.categories || data.categories.length === 0){
      container.innerHTML = '<p style="padding:40px">メニュー準備中です。</p>';
      return;
    }

    data.categories.forEach((category,index) => {

      const section = document.createElement('section');
      section.className = 'category';

      const sortedItems = [...(category.items || [])].sort((a,b) => {
        return Number(a.order || 0) - Number(b.order || 0);
      });

      const defaultImages = [
        'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200',
        'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=1200',
        'https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1200'
      ];

      section.innerHTML = `
        <h2>${category.name || ''}</h2>
        <div class="menu-list">
          ${sortedItems.map((item,i) => `
            <div class="item">
              <img src="${item.image || defaultImages[i % defaultImages.length]}" alt="${item.name}">
              <div>
                <h3>${item.name || ''}</h3>
                <div class="price">${item.price || ''}</div>
                <div class="desc">${item.description || ''}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      container.appendChild(section);

    });

  });

</script>

</body>
</html>
