<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu | Noir Cafe</title>

<style>
:root{
--bg:#f7f3ec;
--dark:#1d1c1a;
--muted:#726d66;
--accent:#b48b58;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Georgia,"Yu Mincho",serif;
background:var(--bg);
color:var(--dark);
line-height:1.8;
}

a{text-decoration:none;color:inherit;}

nav{
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
padding:24px 8vw;
background:rgba(247,243,236,.9);
backdrop-filter:blur(8px);
z-index:100;
}
nav a{
margin-left:24px;
font-size:12px;
letter-spacing:.18em;
}

header{
min-height:70vh;
display:flex;
align-items:center;
padding:8vw;
background:
linear-gradient(rgba(247,243,236,.35),rgba(247,243,236,.65)),
url("https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1800&auto=format&fit=crop")
center/cover;
}

.small{
font-size:12px;
letter-spacing:.3em;
color:var(--accent);
margin-bottom:20px;
}

h1{
font-weight:400;
font-size:clamp(54px,8vw,100px);
line-height:1.05;
margin-bottom:20px;
}

section{
padding:90px 8vw;
}

.label{
font-size:12px;
letter-spacing:.3em;
color:var(--accent);
margin-bottom:20px;
}

h2{
font-size:clamp(34px,5vw,70px);
font-weight:400;
margin-bottom:40px;
}

.menu-item{
display:grid;
grid-template-columns:1fr auto;
gap:30px;
padding:24px 0;
border-bottom:1px solid #ddd;
}

.menu-item h3{
font-size:26px;
font-weight:400;
margin-bottom:6px;
}

.menu-item p{
color:var(--muted);
font-size:14px;
}

.price{
color:var(--accent);
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.gallery img{
width:100%;
height:460px;
object-fit:cover;
}

.cta{
background:#efe8dd;
text-align:center;
padding:120px 30px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:14px 30px;
border:1px solid var(--dark);
}

footer{
padding:30px;
text-align:center;
font-size:12px;
color:#999;
}

@media(max-width:800px){

.menu-item{
grid-template-columns:1fr;
}

.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:300px;
}

nav a{
margin-left:14px;
font-size:10px;
}

section{
padding:70px 24px;
}
}
</style>
</head>
<body>

<nav>
<div>NOIR CAFE</div>
<div>
<a href="index.html">TOP</a>
<a href="#">MENU</a>
</div>
</nav>

<header>
<div>
<div class="small">MENU</div>
<h1>Coffee & Pastry</h1>
</div>
</header>


<section>
<div class="label">COFFEE</div>
<h2>Coffee</h2>

<div class="menu-item">
<div>
<h3>Hand Drip</h3>
<p>季節豆を使用したシングルオリジン</p>
</div>
<div class="price">¥680</div>
</div>

<div class="menu-item">
<div>
<h3>Cafe Latte</h3>
<p>定番シグネチャーラテ</p>
</div>
<div class="price">¥720</div>
</div>

<div class="menu-item">
<div>
<h3>Cold Brew</h3>
<p>水出しで抽出した深い味わい</p>
</div>
<div class="price">¥700</div>
</div>

</section>


<section>
<div class="label">PASTRY</div>
<h2>Pastry</h2>

<div class="menu-item">
<div>
<h3>Croissant</h3>
</div>
<div class="price">¥420</div>
</div>

<div class="menu-item">
<div>
<h3>Cheesecake</h3>
</div>
<div class="price">¥650</div>
</div>

<div class="menu-item">
<div>
<h3>Seasonal Tart</h3>
</div>
<div class="price">¥780</div>
</div>

</section>


<section>
<div class="label">GALLERY</div>
<h2>Scenes</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=1200">
</div>

</section>

<section class="cta">
<div class="label">RESERVE</div>
<h2>ご予約はこちら</h2>
<a class="btn" href="#">LINE予約</a>
</section>

<footer>
© NOIR CAFE
</footer>

</body>
</html>
