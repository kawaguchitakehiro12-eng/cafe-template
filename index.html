<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOIR CAFE</title>

<style>
:root{
--bg:#f8f6f2;
--text:#222;
--muted:#777;
--accent:#b48b58;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family: Georgia,"Yu Mincho",serif;
background:var(--bg);
color:var(--text);
line-height:1.9;
}

nav{
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
padding:20px 6vw;
background:rgba(248,246,242,.9);
backdrop-filter:blur(8px);
z-index:100;
font-size:12px;
letter-spacing:.15em;
}

section{
padding:100px 6vw;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
background:url("https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1800") center/cover;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(255,255,255,.4);
}

.hero-inner{
position:relative;
max-width:800px;
}

.hero h1{
font-size:clamp(48px,8vw,100px);
line-height:1.1;
margin-bottom:20px;
}

.hero p{
max-width:500px;
color:var(--muted);
}

/* CONCEPT */
.concept{
max-width:700px;
margin:auto;
text-align:center;
}

.concept h2{
font-size:clamp(32px,5vw,60px);
margin-bottom:20px;
}

/* MENU */
.menu{
max-width:1000px;
margin:auto;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
margin-top:40px;
}

.card{
background:#fff;
padding:30px;
border:1px solid #eee;
}

.card h3{
font-size:22px;
margin-bottom:10px;
}

.card p{
color:var(--muted);
}

.price{
margin-top:10px;
color:var(--accent);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.gallery img{
width:100%;
height:400px;
object-fit:cover;
}

/* ACCESS */
.info{
max-width:700px;
margin:auto;
}

.row{
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:20px 0;
}

/* MOBILE */
@media(max-width:800px){

section{padding:70px 20px;}

.menu-grid{grid-template-columns:1fr;}

.gallery{grid-template-columns:1fr;}

.hero{height:80vh;}

}
</style>
</head>

<body>

<nav>
<div id="shopNameNav">NOIR CAFE</div>
<div>MENU / ACCESS</div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
<div class="hero-inner">
<h1 id="heroTitle">Slow mornings,<br>good coffee.</h1>
<p id="heroText">
余白を楽しむためのカフェ。
スペシャルティコーヒーと
季節のペストリーを。
</p>
</div>
</section>

<!-- CONCEPT -->
<section class="concept">
<h2>一杯のコーヒーから、<br>一日がはじまる。</h2>
<p>
街の喧騒から少し離れて、
静かな時間を楽しむ場所。
</p>
</section>

<!-- MENU -->
<section class="menu">
<h2>Signature</h2>
<div class="menu-grid" id="menuGrid"></div>
</section>

<!-- GALLERY -->
<section>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?q=80&w=1200">
<img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1200">
</div>
</section>

<!-- ACCESS -->
<section class="info">
<div class="row">
<div>ADDRESS</div>
<div id="address">---</div>
</div>

<div class="row">
<div>OPEN</div>
<div id="open">---</div>
</div>

<div class="row">
<div>CLOSED</div>
<div id="closed">---</div>
</div>
</section>

<script>

/* =========================
   店舗情報
========================= */
fetch('./data/site.json')
.then(res => res.json())
.then(data => {

  const name = data.shopName || "NOIR CAFE";

  document.title = name;
  document.getElementById("shopNameNav").textContent = name;

  document.getElementById("address").textContent = data.address || "";
  document.getElementById("open").textContent = data.open || "";
  document.getElementById("closed").textContent = data.closed || "";

  if(data.mainImage){
    document.getElementById("hero").style.background =
      `url("${data.mainImage}") center/cover`;
  }

});


/* =========================
   メニュー
========================= */
fetch('./data/menu.json')
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";

  const category = data.categories?.[0];

  if(!category || !category.items) return;

  const sorted = category.items.sort((a,b)=> (a.order||0)-(b.order||0));

  sorted.slice(0,3).forEach(item => {

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${item.name || ""}</h3>
      <p>${item.description || ""}</p>
      <div class="price">${item.price || ""}</div>
    `;

    grid.appendChild(el);

  });

});

</script>

</body>
</html>
