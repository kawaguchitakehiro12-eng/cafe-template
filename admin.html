<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
.wrap{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
h2{margin-top:30px;}
input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:6px;
}
button{
margin-top:20px;
padding:12px;
width:100%;
background:#111;
color:#fff;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>管理画面</h1>

<h2>基本情報</h2>
<input id="shopName" placeholder="店舗名">

<h2>ヒーロー</h2>
<input id="heroTitle" placeholder="タイトル">
<textarea id="heroText" placeholder="説明"></textarea>
<input id="heroImage" placeholder="画像URL">

<h2>コンセプト</h2>
<input id="conceptTitle" placeholder="見出し">
<textarea id="conceptText" placeholder="本文"></textarea>

<h2>見出し</h2>
<input id="recommendTitle" placeholder="おすすめタイトル">
<input id="galleryTitle" placeholder="ギャラリータイトル">

<h2>店舗情報</h2>
<input id="address" placeholder="住所">
<input id="open" placeholder="営業時間">
<input id="closed" placeholder="定休日">

<h2>予約</h2>
<input id="reserveTitle" placeholder="予約タイトル">
<input id="lineUrl" placeholder="LINEリンク">

<button onclick="save()">保存</button>

</div>

<script>

const API_URL = "https://lingering-cell-217e.kawaguchitakehiro12.workers.dev";
let menuData = {};

fetch('./data/site.json')
.then(r=>r.json())
.then(data=>{

document.getElementById("shopName").value = data.shopName || "";

document.getElementById("heroTitle").value = data.hero.title || "";
document.getElementById("heroText").value = data.hero.text || "";
document.getElementById("heroImage").value = data.hero.image || "";

document.getElementById("conceptTitle").value = data.concept.title || "";
document.getElementById("conceptText").value = data.concept.text || "";

document.getElementById("recommendTitle").value = data.recommend.title || "";
document.getElementById("galleryTitle").value = data.gallery.title || "";

document.getElementById("address").value = data.access.address || "";
document.getElementById("open").value = data.access.open || "";
document.getElementById("closed").value = data.access.closed || "";

document.getElementById("reserveTitle").value = data.reserve.title || "";
document.getElementById("lineUrl").value = data.reserve.lineUrl || "";

});

fetch('./data/menu.json')
.then(r=>r.json())
.then(data=>{
menuData = data;
});

function save(){

const siteData = {
shopName: document.getElementById("shopName").value,

hero:{
title: document.getElementById("heroTitle").value,
text: document.getElementById("heroText").value,
image: document.getElementById("heroImage").value
},

concept:{
title: document.getElementById("conceptTitle").value,
text: document.getElementById("conceptText").value
},

recommend:{
title: document.getElementById("recommendTitle").value
},

gallery:{
title: document.getElementById("galleryTitle").value
},

access:{
address: document.getElementById("address").value,
open: document.getElementById("open").value,
closed: document.getElementById("closed").value
},

reserve:{
title: document.getElementById("reserveTitle").value,
lineUrl: document.getElementById("lineUrl").value
}
};

fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
repo:"cafe-template",
siteData,
menuData
})
})
.then(()=> alert("保存完了"))
.catch(()=> alert("保存失敗"));

}

</script>

</body>
</html>
